<div class="course-card" #container>
  <div class="course-title">
    {{ (course().courseId || "") + " " + course().name }}
  </div>

  @if (course().iconUrl) {
    <ng-content select="course-image"></ng-content>
  }

  <div class="course-description">
    Edit Title:
    <input
      #courseTitle
      [value]="draftDescription"
      (input)="onTitleChanged(courseTitle.value)"
    >
  </div>

  <!-- <div class="course-category">
    <div class="category" i18n>
      {course().category, select, BEGINNER {Beginner} INTERMEDIATE {Intermediate} ADVANCED {Advanced}}
    </div>
  </div> -->

  <button (click)="onSaveClicked()">Save Course</button>
</div>
