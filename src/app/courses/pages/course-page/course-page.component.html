@if (loading) {
    <div>
        <p>Loading dashboard...</p>
    </div>
}
@if (error) {
    <div>
        <p>Failed to load dashboard data.</p>
    </div>
}
@if (!loading && !error) {
    <div class="demo">
      <button (click)="onEditCourse()" i18n>Edit Course</button>
    </div>

    <div class="courses">
      @for (course of courses; track course.courseId; let i = $index) {
        <course-card      
          (courseChanged)="save($event)"
          type="beginner"
          [course]="course"
          [cardIndex]="i"
        >
          <course-image [src]="course.iconUrl"></course-image>
        </course-card>
      }

    </div>

    <div class="pagination-controls">
      <button (click)="onPageChange(pageNumber - 1)" [disabled]="pageNumber <= 1">
        Previous
      </button>
      <span>Page {{ pageNumber }}</span>
      <button
        (click)="onPageChange(pageNumber + 1)"
        [disabled]="courses.length < pageSize"
      >
        Next
      </button>
      <label>
        Page Size
        <select
          [value]="pageSize"
          (change)="onPageSizeChange(+$any($event.target).value)"
        >
          <option [value]="5">5</option>
          <option [value]="10">10</option>
          <option [value]="25">25</option>
        </select>
      </label>
    </div>
}
<div>
  Total courses: {{ courses.length }}
</div>
